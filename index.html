<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Incremental</title>
</head>
<body>
  <style>
    html {
      background-color: #000000;
      color: #ffffff;
      font-family: "monospace", monospace;
    }
    button {
      font-family: "monospace", monospace
    }
    .curr {
      background-color: var(--cbg, #ffbf00);
      color: var(--cc, #bf8f00);
      width: 450px;
      height: 40px;
      border: var(--cb, 2px solid #bf8f00);
      border-radius: 0px;
    }
    .next {
      background-color: var(--nbg, #007fff);
      color: var(--nc, #005fbf);
      width: 450px;
      height: 40px;
      border: var(--nb, 2px solid #005fbf);
      border-radius: 0px;
    }
    .swit {
      background-color: #bfbfbf;
      color: #7f7f7f;
      width: 60px;
      height: 60px;
      border: 2px solid #7f7f7f;
      border-radius: 0px;
    }
  </style>
  <p id="timer">update plz</p>
  <p id="loadcode">update plz</p>
  <button onclick="prompt('Paste the save file text somewhere safe!', save())">save</button><button onclick="load(prompt('Paste your save file'))">load</button>
  <div style="display: flex; justify-content: center;"><button style="text-align: center;" class="swit" onclick="buttonfunc(3)">Previous Layer</button><button style="text-align: center;" class="swit" onclick="buttonfunc(4)">Next Layer</button></div>
  <h1 id="gold1" style="text-align: center;">update plz</h1>
  <div style="text-align: center;"><button id="add1" class="curr" onclick="buttonfunc(0)">update plz</button></div>
  <div style="text-align: center;"><button id="res1" class="curr" onclick="buttonfunc(1)">update plz</button></div>
  <div style="text-align: center;"><button id="pres1" class="next" onclick="buttonfunc(2)">update plz</button></div>
  <br>
  <h2 id="mult1" style="text-align: center;">update plz</h2>
  <p id="logmult" style="text-align: center;">update plz</p>
</body>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      // alert("Message: " + message + "\n" + "Line: " + lineno + "Col: " + colno)
      return false
    }
  </script>
  <script>
    var newT = new Date().getTime()
    var oldT = 0
    var loadcode = "......".split("").map(v => Math.floor(Math.random()*256))
    var tas = false
    var data = {
      default: new Date().getTime()+"/"+new Date().getTime()+"/0,0/1000,1000/0,0/"+new Date().getTime(),
      startT: new Date().getTime(),
      saveT: new Date().getTime(),
      currT: new Date().getTime(),
      curr: 0,
      gold: [0n, 0n],
      goldm: [1000n, 1000n],
      goldl: [0n, 0n],
      colb: ["ffbf00", "ff0000", "00ffff", "ffbfff", "7fff00", "ffff00", "0000ff", "ff7f00", "7f00ff", "00ff00", "ffbf7f", "009eaa", "bf7f3f", "0000bf", "ff00ff"],
      colf: ["bf8f00", "bf0000", "00bfbf", "bf8fbf", "5fbf00", "bfbf00", "0000bf", "bf3f00", "5f00bf", "00bf00", "bf8f5f", "007cbf", "8f5f2f", "00008f", "bf00bf"]
    }
    function save() {
      data.saveT = new Date().getTime()
      return "v3 "+btoa(data.startT+"/"+data.saveT+"/"+data.gold.join(",")+"/"+data.goldm.join(",")+"/"+data.goldl.join(",")+"/"+data.currT)
    }
    function load(o) {
      let t
      if (o.length == 27 && o.startsWith("TAS")) {
        t = o.substring(3).split("")
        let n = 1
        for (let i = 0; i < t.length; i++) {
          n *= "0123456789abcdef".includes(t[i])
        }
        if (n == 0) {
          alert("TAS KEY INVALID")
        } else {
          t = t.map(v => "0123456789abcdef".indexOf(v))
          if (t[0]*t[1]+t[2]*t[3] == loadcode[0] && t[4]*t[5]+t[6]*t[7] == loadcode[1] && t[8]*t[9]+t[10]*t[11] == loadcode[2] && t[12]*t[13]+t[14]*t[15] == loadcode[3] && t[16]*t[17]+t[18]*t[19] == loadcode[4] && t[20]*t[21]+t[22]*t[23] == loadcode[5]) {
            alert("TAS KEY VALID -- Note: The TAS is unoptimized in finishing this game.")
            data.curr = 0
            data.gold = [0n, 0n]
            data.goldm = [1000n, 1000n]
            data.goldl = [0n, 0n]
            data.startT = new Date().getTime()
            data.saveT = new Date().getTime()
            data.currT = new Date().getTime()
            tas = true
          } else {
            alert("TAS KEY INVALID")
            loadcode = "......".split("").map(v => Math.floor(Math.random()*256))
          }
        }
      } else {
      try {
        t = atob(o.substring(3)) || data.default
      } catch (e) {
        t = data.default
      }
      t = t.split("/")
      if (o.substring(0,3) == "v1 ") {
        t.push("0,0")
      }
      if (o.substring(0,3) == "v2 ") {
        t.push(new Date().getTime().toString())
      }
      if (t.length != 6) {
        t = data.default
      }
      if (/^\d+$/.test(t[0])) {t[0] = Number(t[0])} else {t[0] = new Date().getTime()}
      if (/^\d+$/.test(t[1])) {t[1] = Number(t[1])} else {t[1] = new Date().getTime()}
      if (/^\d+$/.test(t[5])) {t[5] = Number(t[5])} else {t[5] = new Date().getTime()}
      t[2] = t[2].split(",")
      t[3] = t[3].split(",")
      t[4] = t[4].split(",")
      if (o.substring(0,3) == "v1 ") {
        t[4] = ".".repeat(Math.min(t[2].length, t[3].length)).split("").map(v => "0")
      }
      if (Math.min(t[2].length, t[3].length, t[4].length) != t[2].length) {
        t[2] = ["0","0"]
        t[3] = ["1000","1000"]
        t[4] = ["0","0"]
      }
      if(t[2].every(str => /^\d+$/.test(str)) && t[3].every(str => /^\d+$/.test(str)) && t[4].every(str => /^\d+$/.test(str))) {
        t[2] = t[2].map(v => BigInt(v))
        t[3] = t[3].map(v => BigInt(v))
        t[4] = t[4].map(v => BigInt(v))
      } else {
        t[2] = [0n, 0n]
        t[3] = [1000n, 1000n]
        t[4] = [0n, 0n]
      }
      data.startT = t[0]
      data.saveT = t[1]
      data.gold = t[2]
      data.goldm = t[3]
      data.goldl = t[4]
      data.currT = t[5]
      }
    }
    function BImath(x, y, o) {
      return [(a, b) => {return a*b/1000n}, (a, b) => {return a*1000n/b}][o](x, y)
    }
    function BInum(x) {
      let dec = [(x/100n)%10n, (x/10n)%10n, x%10n].join("")
      x=(x/1000n).toString()
      if (x.length < 25) {
        let t = ""
        for (let i = 0; i < x.length; i++) {
          if (i > 0 && (x.length-i)%3 == 0) {
            t+=" "
          }
          t+=x[i]
        }
        return t+"."+dec
      } else {
        return x[0]+"."+x.substring(1, 7)+"e"+(x.length-1)
      }
    }
    function BIsqrt(x) {
      if (x < 0n) {
        return 0n
      }
      if (x >= 0n && x < 2n) {
        return x
      }
      if (x > 1n) {
        let g = x/2n+1n
        let h = (g + x/g)/2n
        while (h < g) {
          g = h
          h = (g + x/g)/2n
        }
        return g
      }
    }
    function BIlog(n, b) {
      let s = 0
      if (n < 1000n) {
        s = 1
        n = 1000000n/n
      }
      let w = 0
      let r = ""
      while (n >= b) {
        w++
        n=n*1000n/b
      }
      while (r.length < 3) {
        n = n**10n/1000n**9n
        let di = 0
        while (n >= b) {
          di++
          n=n*1000n/b
        }
        r+=di
      }
      return BigInt("-".repeat(s)+w+r)
    }
    function addgold() {
      if (data.curr == 0) {
        data.gold[0]+=data.goldm[0]
      } else {
        if (data.gold[data.curr-1] >= 2500000n+500000n*BigInt(data.curr)) {
          data.gold[data.curr]+=BImath((BIsqrt(data.gold[data.curr-1]*8n/(2500000n+500000n*BigInt(data.curr))+1n)-1n)*500n, data.goldm[data.curr], 0)
          data.goldm[data.curr-1]=1000n
          data.gold[data.curr-1]=0n
        }
      }
    }
    function timeCol(x) {
      return "<span style='color: #"+data.colb[Math.floor(x/3600000+14)%15]+"'>"+Math.floor(x/3600000)+"</span><span style='color: #"+data.colf[Math.floor(x/3600000+14)%15]+"'>h </span><span style='color: #"+data.colb[Math.floor(x/60000+14)%15]+"'>"+Math.floor(x/60000)%60+"</span><span style='color: #"+data.colf[Math.floor(x/60000+14)%15]+"'>m </span><span style='color: #"+data.colb[Math.floor(x/1000+14)%15]+"'>"+Math.floor(x/1000)%60+"</span><span style='color: #"+data.colf[Math.floor(x/1000+14)%15]+"'>s</span>"
    }
    document.getElementById("loadcode").innerHTML = "There is no autosave function yet! You have to copy the savefile to somewhere else. "+loadcode
    function buttonfunc(i) {
      [
        () => {addgold()},
        () => {if (data.gold[data.curr] >= 100000n) {data.goldm[data.curr]+=BIsqrt(data.gold[data.curr]/10n); data.gold[data.curr]=0n}},
        () => {if (data.gold[data.curr] >= 2500000n+500000n*BigInt(data.curr)) {data.gold[data.curr+1]+=BImath((BIsqrt(data.gold[data.curr]*8n/(2500000n+500000n*BigInt(data.curr))+1n)-1n)*500n, data.goldm[data.curr+1], 0); data.goldm[data.curr]=1000n; data.gold[data.curr]=0n; if (data.curr == data.gold.length-2) {data.gold.push(0n); data.goldm.push(1000n); data.goldl.push(0n)}}},
        () => {data.curr=Math.max(data.curr-1, 0)},
        () => {data.curr=Math.min(data.curr+1, data.gold.length-2)},
        () => {}
      ][i]()
    }
    function ui() {
      oldT = newT
      newT = new Date().getTime()
      for (let i = 0; i < Math.min(newT-data.currT, 16384/(newT-oldT)); i++) {
        for (let j = 0; j < data.gold.length-1; j++) {
          data.goldl[j]=data.goldl[j]%1000n + BImath(data.gold[j+1], data.goldm[j], 0)%1000n
          data.gold[j]+=BImath(data.gold[j+1], data.goldm[j], 0)/1000n + data.goldl[j]/1000n
        }
        if (tas && (data.currT-data.startT)%25 == 0) {
          let buttonset = 5
          let n = 0
          for (let i = 1; i < data.gold.length-1; i++) {
            if (data.gold[i] >= 100000n) {
              n=i
            }
          }
          if (data.curr > n) {
            buttonset=3
          }
          if (data.curr < n) {
            buttonset = 4
          }
          if (data.curr == n) {
            if (data.gold[n] >= 2500000n+500000n*BigInt(n)) {
              buttonset = 2
            } else if (data.gold[n] >= 100000n && data.goldm[n] < 10000n) {
              buttonset = 1
            } else {
              buttonset = 0
            }
          }
          buttonfunc(buttonset)
        }
        data.currT++
      }
      document.getElementById("timer").innerHTML = timeCol(data.currT - data.startT)+(" (+"+timeCol(new Date().getTime()-data.currT)+" left behind)").repeat(Number(new Date().getTime()-data.currT >= 1000))
      document.documentElement.style.setProperty("--cbg", "#"+data.colb[data.curr%15])
      document.documentElement.style.setProperty("--cc", "#"+data.colf[data.curr%15])
      document.documentElement.style.setProperty("--cb", "2px solid #"+data.colf[data.curr%15])
      document.documentElement.style.setProperty("--nbg", "#"+data.colb[(data.curr+1)%15])
      document.documentElement.style.setProperty("--nc", "#"+data.colf[(data.curr+1)%15])
      document.documentElement.style.setProperty("--nb", "2px solid #"+data.colf[(data.curr+1)%15])
      document.getElementById("gold1").innerHTML="You have <span style='color: #"+data.colf[data.curr%15]+"'>"+BInum(data.gold[data.curr])+"</span> tier-"+(data.curr+1)+" gold."
      document.getElementById("add1").textContent=["+"+BInum(data.goldm[0])+" tier-1 gold", "Prestige last layer to get "+BInum((BIsqrt(data.gold[Math.max(data.curr-1, 0)]*8n/(2000000n+500000n*BigInt(data.curr))+1n)-1n)*500n)+" tier-"+(data.curr+1)+" gold"][Number(data.curr > 0)]
      document.getElementById("res1").textContent=["Reset all tier-"+(data.curr+1)+" gold ("+BInum(100000n-data.gold[data.curr])+" more tier-"+(data.curr+1)+" gold to reset)", "Reset all tier-"+(data.curr+1)+" gold for x"+BInum(data.goldm[data.curr]+BIsqrt(data.gold[data.curr]/10n))+" multiplier"][Number(data.gold[data.curr] >= 100000n)]
      document.getElementById("pres1").textContent=["Prestige for tier-"+(data.curr+2)+" gold ("+BInum((2500000n+500000n*BigInt(data.curr))-data.gold[data.curr])+" more tier-"+(data.curr+1)+" gold to prestige)", "Prestige to get "+BInum((BIsqrt(data.gold[data.curr]*8n/(2500000n+500000n*BigInt(data.curr))+1n)-1n)*500n)+" tier-"+(data.curr+2)+" gold"][Number(data.gold[data.curr] >= (2500000n+500000n*BigInt(data.curr)))]
      document.getElementById("mult1").innerHTML=("Your tier-"+(data.curr+2)+" gold are increasing tier-"+(data.curr+1)+" gold by "+BInum(BImath(data.gold[data.curr+1], data.goldm[data.curr], 0))+"/s.").repeat(Number(data.gold[data.curr+1] > 0n))
      document.getElementById("logmult").innerHTML = "If you layer-reset now, you'll get "+BInum(1000n+250n*BigInt(data.gold.length-2)+BIlog(data.gold[data.gold.length-2], 2500000n+500000n*BigInt(data.gold.length-2))/4n)+" black gold. IS WHAT WOULD HAPPEN IF I ADDED THAT FEATURE."
      requestAnimationFrame(ui)
    }
    ui()
  </script>
</html>
