<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Incremental</title>
</head>
<body>
  <style>
    html {
      background-color: #000000;
      color: #ffffff;
      font-family: "monospace", monospace;
    }
    .curr {
      background-color: var(--cbg, #ffbf00);
      color: var(--cc, #bf8f00);
      width: 450px;
      height: 40px;
      border: var(--cb, 2px solid #bf8f00);
      border-radius: 0px;
    }
    .next {
      background-color: var(--nbg, #007fff);
      color: var(--nc, #005fbf);
      width: 450px;
      height: 40px;
      border: var(--nb, 2px solid #005fbf);
      border-radius: 0px;
    }
    .swit {
      background-color: #bfbfbf;
      color: #7f7f7f;
      width: 60px;
      height: 60px;
      border: 2px solid #7f7f7f;
      border-radius: 0px;
    }
  </style>
  <p id="timer">update plz</p>
  <p>There is no autosave function yet! You have to copy the savefile to somewhere else.</p>
  <button onclick="prompt('Paste the save file text somewhere safe!', save())">save</button><button onclick="load(prompt('Paste your save file'))">load</button>
  <div style="display: flex; justify-content: center;"><button style="text-align: center;" class="swit" onclick="data.curr=Math.max(data.curr-1, 0)">Previous Layer</button><button style="text-align: center;" class="swit" onclick="data.curr=Math.min(data.curr+1, data.gold.length-2)">Next Layer</button></div>
  <h1 id="gold1" style="text-align: center;">update plz</h1>
  <div style="text-align: center;"><button id="add1" class="curr" onclick="addgold()">update plz</button></div>
  <div style="text-align: center;"><button id="res1" class="curr" onclick="if (data.gold[data.curr] >= 100000n) {data.goldm[data.curr]+=BIsqrt(data.gold[data.curr]/10n); data.gold[data.curr]=0n}">update plz</button></div>
  <div style="text-align: center;"><button id="pres1" class="next" onclick="if (data.gold[data.curr] >= 2500000n) {data.gold[data.curr+1]+=BImath((BIsqrt(data.gold[data.curr]/312500n+1n)-1n)*500n, data.goldm[data.curr+1], 0); data.goldm[data.curr]=1000n; data.gold[data.curr]=0n; if (data.curr == data.gold.length-2) {data.gold.push(0n); data.goldm.push(1000n)}}">update plz</button></div>
  <br>
  <h2 id="mult1" style="text-align: center;">update plz</h2>
</body>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      // alert("Message: " + message + "\n" + "Line: " + lineno + "Col: " + colno)
      return false
    }
  </script>
  <script>
    var newT = new Date().getTime()
    var oldT = 0
    var data = {
      default: new Date().getTime()+"/"+new Date().getTime()+"/0,0/1000,1000/0,0",
      startT: new Date().getTime(),
      saveT: new Date().getTime(),
      curr: 0,
      gold: [0n, 0n],
      goldm: [1000n, 1000n],
      goldl: [0n, 0n],
      colb: ["ffbf00", "007fff", "00ffff", "ffbfff", "7fff00", "ffff00", "0000ff", "ff3f00", "7f00ff", "00ff00", "ffbf7f", "009eaa", "bf7f3f", "00bf00", "ff00ff"],
      colf: ["bf8f00", "005fbf", "00bfbf", "bf8fbf", "5fbf00", "bfbf00", "0000bf", "bf2f00", "5f00bf", "00bf00", "bf8f5f", "007cbf", "8f5f2f", "008f00", "bf00bf"]
    }
    function save() {
      data.saveT = new Date().getTime()
      return "v2 "+btoa(data.startT+"/"+data.saveT+"/"+data.gold.join(",")+"/"+data.goldm.join(",")+"/"+data.goldl.join(","))
    }
    function load(o) {
      let t
      try {
        t = atob(o.substring(3)) || data.default
      } catch (e) {
        t = data.default
      }
      t = t.split("/")
      if (o.substring(0,3) == "v1") {
        t.push("0,0")
      }
      if (t.length != 5) {
        t = data.default
      }
      if (/^\d+$/.test(t[0])) {t[0] = Number(t[0])} else {t[0] = new Date().getTime()}
      if (/^\d+$/.test(t[1])) {t[1] = Number(t[1])} else {t[1] = new Date().getTime()}
      t[2] = t[2].split(",")
      t[3] = t[3].split(",")
      t[4] = t[4].split(",")
      if (o.substring(0,3) == "v1") {
        t[4] = ".".repeat(Math.min(t[2].length, t[3].length)).split("").map(v => "0")
      }
      if (Math.min(t[2].length, t[3].length, t[4].length) != t[2].length) {
        t[2] = ["0","0"]
        t[3] = ["1000","1000"]
        t[4] = ["0", "0"]
      }
      if(t[2].every(str => /^\d+$/.test(str)) && t[3].every(str => /^\d+$/.test(str))) {
        t[2] = t[2].map(v => BigInt(v))
        t[3] = t[3].map(v => BigInt(v))
        t[4] = t[4].map(v => BigInt(v))
      } else {
        t[2] = [0n, 0n]
        t[3] = [1000n, 1000n]
        t[3] = [0n, 0n]
      }
      data.startT = t[0]
      data.saveT = t[1]
      data.gold = t[2]
      data.goldm = t[3]
      data.goldl = t[4]
      let off = new Date().getTime()-data.saveT
      for (let i = 0; i < data.gold.length-1; i++) {
        data.goldl[i]=data.goldl[i]%1000n + (BImath(data.gold[i+1], data.goldm[i], 0)*BigInt(off)/1000n)%1000n
        data.gold[i]+=BImath(data.gold[i+1], data.goldm[i], 0)*BigInt(off)/1000000n + data.goldl[i]/1000n
      }
    }
    function BImath(x, y, o) {
      return [(a, b) => {return a*b/1000n}, (a, b) => {return a*1000n/b}][o](x, y)
    }
    function BInum(x) {
      let dec = [(x/100n)%10n, (x/10n)%10n, x%10n].join("")
      x=(x/1000n).toString()
      if (x.length < 25) {
        let t = ""
        for (let i = 0; i < x.length; i++) {
          if (i > 0 && (x.length-i)%3 == 0) {
            t+=" "
          }
          t+=x[i]
        }
        return t+"."+dec
      } else {
        return x[0]+"."+x.substring(1, 7)+"*10^"+(x.length-1)
      }
    }
    function BIsqrt(x) {
      if (x < 0n) {
        return 0n
      }
      if (x >= 0n && x < 2n) {
        return x
      }
      if (x > 1n) {
        let g = x/2n+1n
        let h = (g + x/g)/2n
        while (h < g) {
          g = h
          h = (g + x/g)/2n
        }
        return g
      }
    }
    function addgold() {
      if (data.curr == 0) {
        data.gold[0]+=data.goldm[0]
      } else {
        if (data.gold[data.curr-1] >= 2500000n) {
          data.gold[data.curr]+=BImath((BIsqrt(data.gold[data.curr-1]/312500n+1n)-1n)*500n, data.goldm[data.curr], 0)
          data.goldm[data.curr-1]=1000n
          data.gold[data.curr-1]=0n
        }
      }
    }
    function ui() {
      oldT = newT
      newT = new Date().getTime()
      for (let i = 0; i < Math.min(newT-oldT, 200); i++) {
        for (let j = 0; j < data.gold.length-1; j++) {
          data.goldl[j]=data.goldl[j]%1000n + BImath(data.gold[j+1], data.goldm[j], 0)%1000n
          data.gold[j]+=BImath(data.gold[j+1], data.goldm[j], 0)/1000n + data.goldl[j]/1000n
        }
      }
      document.getElementById("timer").innerHTML = "<span style='color: #"+data.colb[Math.floor((new Date().getTime()-data.startT)/3600000+14)%15]+"'>"+Math.floor((new Date().getTime()-data.startT)/3600000)+"</span><span style='color: #"+data.colf[Math.floor((new Date().getTime()-data.startT)/3600000+14)%15]+"'>h </span><span style='color: #"+data.colb[Math.floor((new Date().getTime()-data.startT)/60000+14)%15]+"'>"+Math.floor((new Date().getTime()-data.startT)/60000)%60+"</span><span style='color: #"+data.colf[Math.floor((new Date().getTime()-data.startT)/60000+14)%15]+"'>m </span><span style='color: #"+data.colb[Math.floor((new Date().getTime()-data.startT)/1000+14)%15]+"'>"+Math.floor((new Date().getTime()-data.startT)/1000)%60+"</span><span style='color: #"+data.colf[Math.floor((new Date().getTime()-data.startT)/1000+14)%15]+"'>s</span>"
      document.documentElement.style.setProperty("--cbg", "#"+data.colb[data.curr%15])
      document.documentElement.style.setProperty("--cc", "#"+data.colf[data.curr%15])
      document.documentElement.style.setProperty("--cb", "2px solid #"+data.colf[data.curr%15])
      document.documentElement.style.setProperty("--nbg", "#"+data.colb[(data.curr+1)%15])
      document.documentElement.style.setProperty("--nc", "#"+data.colf[(data.curr+1)%15])
      document.documentElement.style.setProperty("--nb", "2px solid #"+data.colf[(data.curr+1)%15])
      document.getElementById("gold1").innerHTML="You have <span style='color: #"+data.colf[data.curr%15]+"'>"+BInum(data.gold[data.curr])+"</span> tier-"+(data.curr+1)+" gold."
      document.getElementById("add1").textContent=["+"+BInum(data.goldm[0])+" tier-1 gold", "Prestige last layer to get "+BInum((BIsqrt(data.gold[Math.max(data.curr-1, 0)]/312500n+1n)-1n)*500n)+" tier-"+(data.curr+1)+" gold"][Number(data.curr > 0)]
      document.getElementById("res1").textContent=["Reset all tier-"+(data.curr+1)+" gold ("+BInum(100000n-data.gold[data.curr])+" more tier-"+(data.curr+1)+" gold to reset)", "Reset all tier-"+(data.curr+1)+" gold for x"+BInum(data.goldm[data.curr]+BIsqrt(data.gold[data.curr]/10n))+" multiplier"][Number(data.gold[data.curr] >= 100000n)]
      document.getElementById("pres1").textContent=["Prestige for tier-"+(data.curr+2)+" gold ("+BInum(2500000n-data.gold[data.curr])+" more tier-"+(data.curr+1)+" gold to prestige)", "Prestige to get "+BInum((BIsqrt(data.gold[data.curr]/312500n+1n)-1n)*500n)+" tier-"+(data.curr+2)+" gold"][Number(data.gold[data.curr] >= 2500000n)]
      document.getElementById("mult1").innerHTML=("Your tier-"+(data.curr+2)+" gold are increasing tier-"+(data.curr+1)+" gold by "+BInum(BImath(data.gold[data.curr+1], data.goldm[data.curr], 0))+"/s.").repeat(Number(data.gold[data.curr+1] > 0n))
      requestAnimationFrame(ui)
    }
    ui()
  </script>
</html>
